name: Build & push images (Docker Hub)

# Triggers
#   • push to main         → tagged with branch + short-sha
#   • push of v* tag       → tagged with semver + sha-suffix; auto-dispatches deploy
#   • workflow_dispatch    → manual rebuild from any ref (audit-tracked via `reason`)
#
# Auth: DOCKERHUB_USERNAME + DOCKERHUB_TOKEN (repo-level secrets — same secret
# names used in mpairwe7/OptiscanAI and FinalYearProject/App). Images push to
# docker.io/${DOCKERHUB_USERNAME}/landguard-uganda-{backend,frontend}.
#
# SHA-suffixed tags (e.g. v0.1.0-showcase-abc1234) are emitted alongside the
# nominal version tag so the deploy-cranecloud.yml workflow can PATCH the
# Crane Cloud app's image field with a fresh string on every push, forcing a
# pod rollover. Crane Cloud diffs the image field as a string, so PATCHing
# the floating :latest or :v0.1.0-showcase tag is a no-op — only the
# sha-suffixed tag guarantees rollover.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you rebuilding? (audit trail)"
        required: false
        default: "manual rebuild"

concurrency:
  group: build-push-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  REGISTRY: docker.io

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: backend
            context: backend
            dockerfile: backend/Dockerfile
            image_name: landguard-uganda-backend
          - app: frontend
            context: frontend
            dockerfile: frontend/Dockerfile
            image_name: landguard-uganda-frontend

    name: ${{ matrix.app }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Hub secrets
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          : "${DOCKERHUB_USERNAME:?DOCKERHUB_USERNAME secret missing — add at Settings → Secrets and variables → Actions}"
          : "${DOCKERHUB_TOKEN:?DOCKERHUB_TOKEN secret missing — generate at hub.docker.com → Account Settings → Personal access tokens}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        # docker/login-action@v3 was failing with "malformed HTTP Authorization
        # header" on a valid PAT — likely a trailing-newline quirk. Bypass with
        # explicit shell so we have visibility into how the token is fed.
        env:
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DH_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          # printf '%s' strips the trailing newline echo would add. -- terminates
          # docker login flag parsing if the user happens to start with `-`.
          printf '%s' "$DH_TOKEN" | docker login -u "$DH_USER" --password-stdin
          echo "→ docker login succeeded"

      # Derives tag list deterministically. SHA-suffixed variants are critical
      # for the deploy-cranecloud.yml rollover trick (string-diff against
      # Crane Cloud's stored image field).
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image_name }}
          tags: |
            type=ref,event=branch
            type=ref,event=branch,suffix=-{{sha}}
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{version}},suffix=-{{sha}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-') }}
          labels: |
            org.opencontainers.image.title=LandGuard Uganda — ${{ matrix.app }}
            org.opencontainers.image.description=Blockchain-enhanced Ugandan land administration & titling support (${{ matrix.app }}).
            org.opencontainers.image.vendor=LandGuard Uganda
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.documentation=https://github.com/${{ github.repository }}/blob/main/README.md

      - name: Build & push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

      - name: Image summary
        run: |
          {
            echo "### ${{ matrix.app }} image pushed"
            echo "- registry: \`${{ env.REGISTRY }}\`"
            echo "- digest: \`${{ steps.build.outputs.digest }}\`"
            echo "- tags:"
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # Auto-dispatch the Crane Cloud rollout for v* tag pushes.
  # Production deploys triggered from main pushes are intentionally
  # left to operator dispatch; see the security note in
  # docs/adr/0002-zero-trust-posture.md.
  dispatch-deploy:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    # The default workflow-scoped GITHUB_TOKEN (granted `contents: read` at
    # the top of this file) is forbidden by GitHub from calling the
    # workflow-dispatch REST endpoint — the API responds with
    # `x-accepted-github-permissions: actions=write`. Grant it explicitly
    # at the job level so this job (and only this job) can dispatch
    # deploy-cranecloud.yml. Repo-wide `contents: read` still applies.
    permissions:
      contents: read
      actions: write
    steps:
      - name: Trigger Crane Cloud rollout
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy-cranecloud.yml',
              ref: context.ref,
              inputs: {
                target: 'both',
                image_tag: tag,
              }
            });
            core.notice(`Dispatched deploy-cranecloud (tag=${tag})`);
