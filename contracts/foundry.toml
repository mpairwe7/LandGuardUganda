[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
]
# Allow reading the cross-language Merkle parity fixture (and any other
# read-only test data committed under ``contracts/test/``). Scoped to the
# test directory — no write access, no other paths.
fs_permissions = [{ access = "read", path = "./test" }]

[profile.ci]
verbosity = 3
fuzz = { runs = 1024 }

[rpc_endpoints]
anvil = "http://localhost:8545"
sepolia = "${SEPOLIA_RPC_URL}"
