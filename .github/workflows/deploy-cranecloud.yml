name: Deploy to Crane Cloud

# Direct Crane Cloud HTTP API rollout — mirrors the pattern proven in
# mpairwe7/OptiscanAI. We deliberately do NOT install the `cranecloud`
# CLI inside CI: the CLI requires an OS keyring backend (D-Bus
# SecretService) that GitHub runners don't provide, which made the
# previous CLI-based workflow brittle. Direct `curl` against
# api.cranecloud.io is portable, leaves no token on disk, and
# round-trips in under 30s for the whole push→deploy→health-check loop.
#
# Triggered:
#   • manually   → workflow_dispatch with image_tag
#   • by build   → build-push.yml fires this on push of v* tag
#
# Authentication flow:
#   1. POST /users/login with email+password (in JSON body, not argv)
#      → returns { data: { access_token: "<jwt>" } }
#   2. PATCH /apps/{app_id} with { image: "<docker.io path>:<tag>-<sha7>" }
#      → triggers Crane Cloud to pull the new image and restart the pod
#   3. GET <public-url>/healthz → poll until 200 or timeout
#
# SHA-tagging matters: Crane Cloud diffs the `image` field as a string.
# PATCHing with the same `:latest` or `:v0.1.0-showcase` tag is a no-op
# (no pod restart). We use `<tag>-<short-sha>` so every CI run produces
# a fresh image string that Crane Cloud sees as new.

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to roll out (e.g. v0.1.0-showcase). The SHA suffix is appended automatically."
        type: string
        required: true
      target:
        description: "Which app(s) to redeploy"
        type: choice
        options: [backend, frontend, both]
        default: both
        required: true

concurrency:
  group: deploy-cranecloud-${{ github.ref }}
  cancel-in-progress: false       # never cancel an in-flight production rollout

permissions:
  contents: read

env:
  CRANE_CLOUD_API: https://api.cranecloud.io

jobs:
  deploy:
    name: Deploy ${{ inputs.target }} (${{ inputs.image_tag }})
    runs-on: ubuntu-latest
    # GitHub Environment gates approvals + holds environment-scoped secrets.
    # The `production` environment is configured with required reviewers
    # per MAINTAINERS.md "Out-of-band review escalation".
    environment: production
    steps:
      - name: Validate required environment-scoped secrets
        run: |
          set -euo pipefail
          : "${CRANE_CLOUD_EMAIL:?CRANE_CLOUD_EMAIL environment secret is missing}"
          : "${CRANE_CLOUD_PASSWORD:?CRANE_CLOUD_PASSWORD environment secret is missing}"
          : "${DOCKERHUB_USERNAME:?DOCKERHUB_USERNAME secret is missing}"
          if [[ "${{ inputs.target }}" != "frontend" ]]; then
            : "${CRANE_CLOUD_BACKEND_APP_ID:?CRANE_CLOUD_BACKEND_APP_ID environment secret is missing}"
          fi
          if [[ "${{ inputs.target }}" != "backend" ]]; then
            : "${CRANE_CLOUD_FRONTEND_APP_ID:?CRANE_CLOUD_FRONTEND_APP_ID environment secret is missing}"
          fi
        env:
          CRANE_CLOUD_EMAIL: ${{ secrets.CRANE_CLOUD_EMAIL }}
          CRANE_CLOUD_PASSWORD: ${{ secrets.CRANE_CLOUD_PASSWORD }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          CRANE_CLOUD_BACKEND_APP_ID: ${{ secrets.CRANE_CLOUD_BACKEND_APP_ID }}
          CRANE_CLOUD_FRONTEND_APP_ID: ${{ secrets.CRANE_CLOUD_FRONTEND_APP_ID }}

      - name: Authenticate with Crane Cloud
        id: auth
        env:
          CRANE_CLOUD_EMAIL: ${{ secrets.CRANE_CLOUD_EMAIL }}
          CRANE_CLOUD_PASSWORD: ${{ secrets.CRANE_CLOUD_PASSWORD }}
        run: |
          set -euo pipefail
          # POST credentials in JSON body — never on the URL or argv.
          TOKEN=$(curl -sf -X POST "$CRANE_CLOUD_API/users/login" \
            -H "Content-Type: application/json" \
            -d "{\"email\": \"$CRANE_CLOUD_EMAIL\", \"password\": \"$CRANE_CLOUD_PASSWORD\"}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['access_token'])")
          if [ -z "$TOKEN" ]; then
            echo "::error::Crane Cloud authentication returned no token"
            exit 1
          fi
          echo "→ Authenticated"
          # Mask the token in GitHub Actions logs even if anything echoes it.
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Deploy backend
        if: inputs.target == 'backend' || inputs.target == 'both'
        env:
          TOKEN: ${{ steps.auth.outputs.token }}
          APP_ID: ${{ secrets.CRANE_CLOUD_BACKEND_APP_ID }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          set -euo pipefail
          SHA7="${GITHUB_SHA:0:7}"
          IMAGE="$DOCKERHUB_USERNAME/landguard-uganda-backend:${{ inputs.image_tag }}-${SHA7}"
          echo "→ Updating backend ($APP_ID) → $IMAGE"
          STATUS=$(curl -sf -o /tmp/backend-resp.json -w "%{http_code}" -X PATCH \
            "$CRANE_CLOUD_API/apps/$APP_ID" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"image\": \"$IMAGE\"}")
          echo "  HTTP $STATUS"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 300 ]; then
            cat /tmp/backend-resp.json
            exit 1
          fi

      - name: Deploy frontend
        if: inputs.target == 'frontend' || inputs.target == 'both'
        env:
          TOKEN: ${{ steps.auth.outputs.token }}
          APP_ID: ${{ secrets.CRANE_CLOUD_FRONTEND_APP_ID }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          set -euo pipefail
          SHA7="${GITHUB_SHA:0:7}"
          IMAGE="$DOCKERHUB_USERNAME/landguard-uganda-frontend:${{ inputs.image_tag }}-${SHA7}"
          echo "→ Updating frontend ($APP_ID) → $IMAGE"
          STATUS=$(curl -sf -o /tmp/frontend-resp.json -w "%{http_code}" -X PATCH \
            "$CRANE_CLOUD_API/apps/$APP_ID" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"image\": \"$IMAGE\"}")
          echo "  HTTP $STATUS"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 300 ]; then
            cat /tmp/frontend-resp.json
            exit 1
          fi

      - name: Health-check backend
        if: (inputs.target == 'backend' || inputs.target == 'both') && env.CRANE_CLOUD_BACKEND_URL != ''
        env:
          CRANE_CLOUD_BACKEND_URL: ${{ secrets.CRANE_CLOUD_BACKEND_URL }}
        run: |
          echo "Waiting for backend deployment..."
          for i in $(seq 1 20); do
            HTTP=$(curl -sf -o /dev/null -w "%{http_code}" "$CRANE_CLOUD_BACKEND_URL/healthz" 2>/dev/null || echo "000")
            echo "  [$i] /healthz=$HTTP"
            if [ "$HTTP" = "200" ]; then
              echo "→ Backend healthy"
              curl -sf "$CRANE_CLOUD_BACKEND_URL/readyz" | python3 -m json.tool || true
              exit 0
            fi
            sleep 15
          done
          echo "::warning::Backend /healthz did not return 200 within 5 minutes (deploy may still be progressing)"

      - name: Health-check frontend
        if: (inputs.target == 'frontend' || inputs.target == 'both') && env.CRANE_CLOUD_FRONTEND_URL != ''
        env:
          CRANE_CLOUD_FRONTEND_URL: ${{ secrets.CRANE_CLOUD_FRONTEND_URL }}
        run: |
          echo "Waiting for frontend deployment..."
          for i in $(seq 1 20); do
            HTTP=$(curl -sf -o /dev/null -w "%{http_code}" "$CRANE_CLOUD_FRONTEND_URL/api/health" 2>/dev/null || echo "000")
            echo "  [$i] /api/health=$HTTP"
            if [ "$HTTP" = "200" ]; then
              echo "→ Frontend healthy"
              exit 0
            fi
            sleep 15
          done
          echo "::warning::Frontend /api/health did not return 200 within 5 minutes (deploy may still be progressing)"

      - name: Deploy summary
        if: always()
        run: |
          {
            echo "### Crane Cloud deploy"
            echo
            echo "| Field      | Value |"
            echo "| ---------- | ----- |"
            echo "| target     | \`${{ inputs.target }}\` |"
            echo "| image_tag  | \`${{ inputs.image_tag }}\` |"
            echo "| sha7       | \`${GITHUB_SHA:0:7}\` |"
            echo "| status     | \`${{ job.status }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
