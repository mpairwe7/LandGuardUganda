name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Python 3.12)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        # `--extra dev` brings in ruff / mypy / pytest from
        # [project.optional-dependencies].dev — without it the
        # Lint / Type-check / Tests steps below fail with
        # "Failed to spawn: ruff" on a fresh runner.
        run: uv sync --frozen --extra dev

      - name: Lint (ruff)
        run: uv run ruff check app tests

      - name: Type check (mypy)
        # `--explicit-package-bases` makes mypy find sub-packages
        # without each parent dir owning an __init__.py — required
        # since `app.util.metrics` is referenced from inside the
        # package itself. Strict baseline still in progress; keep
        # continue-on-error until the type debt is paid down.
        run: uv run mypy --explicit-package-bases app
        continue-on-error: true

      - name: Tests (pytest)
        run: uv run pytest -q --tb=short

      - name: Cross-language Merkle parity (offline verifier)
        # Run the standalone offline verifier against the canonical fixture
        # emitted by emit_merkle_vectors.py. This is the Python half of the
        # tri-language parity check (the other halves run in the contracts
        # and frontend jobs). Any drift here, in MerkleParity.t.sol, or in
        # frontend/src/__tests__/merkle.parity.test.ts breaks Public Claim 2.
        working-directory: ${{ github.workspace }}
        run: uv run --project backend python scripts/verify_offline.py --parity contracts/test/merkle-parity.json

  contracts:
    name: Contracts (Foundry)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Forge build
        run: forge build --sizes

      - name: Forge test
        run: forge test -vvv

      - name: Forge coverage (informational)
        run: forge coverage --report summary
        continue-on-error: true

  frontend:
    name: Frontend (Bun + Next.js 16)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.x"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Lint
        # `bun run lint` is a stub until ESLint v9 + eslint-config-next
        # is wired up (see frontend/package.json). Typechecking above
        # already covers correctness; this step is here so the slot is
        # named and findable once ESLint is real.
        run: bun run lint

      - name: Unit tests (vitest) — incl. Merkle parity
        # Runs the TypeScript half of the cross-language Merkle parity check
        # against contracts/test/merkle-parity.json. The matching Python and
        # Solidity halves run in the backend and contracts jobs.
        run: bun run test

      - name: Build
        run: bun run build
        env:
          BACKEND_URL: http://localhost:8000
          NEXT_PUBLIC_APP_NAME: LandGuard Uganda
          NEXT_PUBLIC_DEFAULT_DISTRICT_ID: "3"

  accessibility:
    name: Accessibility (Playwright + axe-core)
    runs-on: ubuntu-latest
    needs: frontend
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.x"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Build frontend
        run: bun run build
        env:
          BACKEND_URL: http://localhost:8000
          NEXT_PUBLIC_APP_NAME: LandGuard Uganda
          NEXT_PUBLIC_DEFAULT_DISTRICT_ID: "3"

      - name: Start production server
        run: |
          PORT=3031 bun run start --port 3031 &
          echo $! > /tmp/landguard-frontend.pid
          # Wait for /api/health (Next.js route handler) to be ready
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:3031/api/health >/dev/null 2>&1; then
              echo "→ Frontend ready"; exit 0
            fi
            sleep 1
          done
          echo "✗ Frontend never became ready"; exit 1

      - name: Run axe-core accessibility spec
        # Scope to accessibility.spec.ts — the smoke/flows specs assume a
        # deployed backend (CORS-direct to landguard-backend-*.cranecloud.io)
        # and aren't meant for the CI's localhost-only environment. They
        # run manually against the live deploy.
        run: BASE_URL=http://localhost:3031 bunx playwright test accessibility.spec.ts --reporter=list

      - name: Stop production server
        if: always()
        run: kill $(cat /tmp/landguard-frontend.pid) 2>/dev/null || true

      - name: Upload axe + Playwright artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-${{ github.sha }}
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 90

  dependency-audit:
    name: Dependency audit (OSV)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run OSV-Scanner
        uses: google/osv-scanner-action/osv-scanner-action@v1.9.1
        with:
          scan-args: |-
            --lockfile=backend/uv.lock
            --lockfile=frontend/bun.lock
            --recursive
        continue-on-error: true   # don't fail on transient advisory-feed issues; surface in checks

  sbom:
    name: SBOM generate + content-address
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install uv (backend SBOM)
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"

      - name: Install Bun (frontend SBOM)
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.x"

      - name: Set up Node (cyclonedx-npm CLI)
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install backend deps (for cyclonedx-py environment scan)
        run: |
          cd backend
          uv sync --frozen

      - name: Install frontend deps (for cyclonedx-npm)
        run: |
          cd frontend
          bun install --frozen-lockfile

      - name: Generate SBOMs
        run: bash scripts/generate_sbom.sh

      - name: Upload SBOM artefacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: evidence/sbom/
          retention-days: 90

  # Verify Dockerfiles still build on every PR. We do not push here —
  # the GHCR push happens in build-push.yml on main + v* tags only.
  docker-build:
    name: Docker build verify (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: backend
            context: backend
            dockerfile: backend/Dockerfile
          - app: frontend
            context: frontend
            dockerfile: frontend/Dockerfile
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: false
          load: true
          tags: landguard-${{ matrix.app }}:ci-verify
          cache-from: type=gha,scope=${{ matrix.app }}-verify
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}-verify
