name: Build & push images (Docker Hub)

# Triggers
#   • push to main         → tagged with branch + short-sha
#   • push of v* tag       → tagged with semver + "latest" on non-prerelease releases
#   • workflow_dispatch    → manual rebuild from any ref (audit-tracked via the `reason` input)
#
# Auth: reuses the user-/org-level DockerHub secrets already configured for
# Mpairwe7/FinalYearProject and Mpairwe7/HealthSyncUganda — DOCKERHUB_USERNAME
# and DOCKERHUB_TOKEN. The image namespace is `vars.DOCKER_IMAGE_OWNER`; if
# unset we fall back to the DOCKERHUB_USERNAME secret so a freshly-cloned
# repo still works with zero extra configuration.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you rebuilding? (audit trail)"
        required: false
        default: "manual rebuild"

concurrency:
  group: build-push-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write          # for cosign keyless OIDC, if/when enabled

env:
  REGISTRY: docker.io
  # Optional namespace override. If empty (the common case), the resolve
  # step below uses the DOCKERHUB_USERNAME secret. Set this repository
  # variable (Settings → Variables) when pushing under an org namespace
  # like `landguardug` rather than a personal one.
  IMAGE_OWNER: ${{ vars.DOCKER_IMAGE_OWNER }}

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: backend
            context: backend
            dockerfile: backend/Dockerfile
            image_suffix: landguard-uganda-backend
          - app: frontend
            context: frontend
            dockerfile: frontend/Dockerfile
            image_suffix: landguard-uganda-frontend

    name: ${{ matrix.app }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate DockerHub secrets are present
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          : "${DOCKERHUB_USERNAME:?DOCKERHUB_USERNAME secret is missing — configure under Settings → Secrets and variables → Actions (or at the user/org level so it's shared with FinalYearProject + HealthSyncUganda)}"
          : "${DOCKERHUB_TOKEN:?DOCKERHUB_TOKEN secret is missing — create at hub.docker.com → Account Settings → Personal access tokens}"

      - name: Resolve image owner
        id: owner
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          set -euo pipefail
          OWNER="${{ env.IMAGE_OWNER }}"
          if [ -z "$OWNER" ]; then
            OWNER="$DOCKERHUB_USERNAME"
          fi
          echo "owner=$OWNER" >> "$GITHUB_OUTPUT"
          echo "→ Pushing as: docker.io/$OWNER/${{ matrix.image_suffix }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Derives tag list deterministically:
      #   - branch name (e.g. main)
      #   - short SHA (always)
      #   - semver version (when ref is v*)
      #   - latest (only on a non-prerelease v* tag)
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.owner.outputs.owner }}/${{ matrix.image_suffix }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-') }}
          labels: |
            org.opencontainers.image.title=LandGuard Uganda — ${{ matrix.app }}
            org.opencontainers.image.description=Blockchain-enhanced Ugandan land administration & titling support (${{ matrix.app }}).
            org.opencontainers.image.vendor=LandGuard Uganda
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.documentation=https://github.com/${{ github.repository }}/blob/main/README.md

      - name: Build & push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false                                  # keep image SBOM simple at prototype stage
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

      - name: Image summary
        run: |
          {
            echo "### ${{ matrix.app }} image pushed"
            echo "- registry: \`${{ env.REGISTRY }}\`"
            echo "- namespace: \`${{ steps.owner.outputs.owner }}\`"
            echo "- digest: \`${{ steps.build.outputs.digest }}\`"
            echo "- tags:"
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # Auto-dispatch Crane Cloud rollout for non-production targets after a
  # successful build of main / v* tag. Production deploys remain
  # operator-triggered via workflow_dispatch on deploy-cranecloud.yml.
  dispatch-deploy:
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Compute deploy environment
        id: env
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "env=pilot"    >> $GITHUB_OUTPUT
            echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          else
            echo "env=staging"  >> $GITHUB_OUTPUT
            echo "tag=sha-$(git rev-parse --short HEAD || echo ${GITHUB_SHA::7})" >> $GITHUB_OUTPUT
          fi

      - name: Trigger Crane Cloud rollout
        uses: actions/github-script@v7
        with:
          script: |
            const env = '${{ steps.env.outputs.env }}';
            const tag = '${{ steps.env.outputs.tag }}';
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy-cranecloud.yml',
              ref: context.ref,
              inputs: {
                env: env,
                target: 'both',
                image_tag: tag,
              }
            });
            core.notice(`Dispatched deploy-cranecloud (env=${env}, tag=${tag})`);
