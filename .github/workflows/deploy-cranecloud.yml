name: Deploy to Crane Cloud

# Operator-led rollout to Crane Cloud (Makerere AI Lab's Uganda PaaS).
# Triggered:
#   • manually   → workflow_dispatch with env + target + image_tag
#   • by build   → build-push.yml fires this on main → staging, v* → pilot
#                  (production is NEVER auto-dispatched — see deploy summary).
#
# Non-interactive auth flow: the cranecloud CLI normally talks to the OS
# keyring. In CI we disable the keyring backend and seed the on-disk
# token from a GitHub Environment secret. If the CLI version refuses to
# accept the seeded token (regression risk), the job FAILS LOUDLY and
# posts a fallback recipe to the run summary. We never silently no-op a
# production deploy.

on:
  workflow_dispatch:
    inputs:
      env:
        description: "Target environment"
        type: choice
        options: [staging, pilot, production]
        default: pilot
        required: true
      target:
        description: "Which app(s) to update"
        type: choice
        options: [backend, frontend, both]
        default: both
        required: true
      image_tag:
        description: "Image tag to roll out (e.g. v0.1.0-showcase or sha-abc1234)"
        type: string
        required: true

concurrency:
  group: deploy-cranecloud-${{ inputs.env }}
  cancel-in-progress: false       # never cancel an in-flight production rollout

permissions:
  contents: read

jobs:
  deploy:
    name: cranecloud apps update (${{ inputs.env }})
    runs-on: ubuntu-latest
    # GitHub Environment gates approvals + holds environment-scoped secrets.
    # The production environment is configured with required reviewers per
    # MAINTAINERS.md "Out-of-band review escalation" + docs/CUSTODY.md.
    environment:
      name: cranecloud-${{ inputs.env }}
    env:
      PYTHON_KEYRING_BACKEND: keyring.backends.null.Keyring

    steps:
      - name: Checkout (for fallback recipe reference)
        uses: actions/checkout@v4

      - name: Validate required environment-scoped secrets
        # Mirrors the ${VAR:?Set ...} strictness from docker-compose.sepolia.yml —
        # refuse to proceed on a missing input. Each environment must have its
        # own complete set under Settings → Environments → cranecloud-<env>.
        run: |
          set -euo pipefail
          : "${CRANECLOUD_TOKEN:?CRANECLOUD_TOKEN environment secret is missing}"
          : "${CRANECLOUD_USER_ID:?CRANECLOUD_USER_ID environment secret is missing}"
          : "${CRANECLOUD_PROJECT_ID:?CRANECLOUD_PROJECT_ID environment secret is missing}"
          if [[ "${{ inputs.target }}" != "frontend" ]]; then
            : "${CRANECLOUD_BACKEND_APP_ID:?CRANECLOUD_BACKEND_APP_ID environment secret is missing}"
          fi
          if [[ "${{ inputs.target }}" != "backend" ]]; then
            : "${CRANECLOUD_FRONTEND_APP_ID:?CRANECLOUD_FRONTEND_APP_ID environment secret is missing}"
          fi
        env:
          CRANECLOUD_TOKEN: ${{ secrets.CRANECLOUD_TOKEN }}
          CRANECLOUD_USER_ID: ${{ secrets.CRANECLOUD_USER_ID }}
          CRANECLOUD_PROJECT_ID: ${{ secrets.CRANECLOUD_PROJECT_ID }}
          CRANECLOUD_BACKEND_APP_ID: ${{ secrets.CRANECLOUD_BACKEND_APP_ID }}
          CRANECLOUD_FRONTEND_APP_ID: ${{ secrets.CRANECLOUD_FRONTEND_APP_ID }}

      - name: Set up Python (cranecloud CLI is pip-installable)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cranecloud CLI
        run: |
          set -euo pipefail
          pip install --upgrade pip
          # Pin a known-good version once published. Until then, attempt both
          # candidate distribution names — the CLI has been published under
          # multiple names during its alpha.
          pip install cranecloud || pip install crane-cloud-cli
          which cranecloud
          cranecloud --help | head -5

      - name: Seed cranecloud token from secret
        # Restore the on-disk token the CLI expects at ~/.cranecloud/token.
        # The keyring is disabled via PYTHON_KEYRING_BACKEND so the CLI will
        # not attempt to unlock a passphrase from the OS keyring.
        run: |
          set -euo pipefail
          mkdir -p ~/.cranecloud
          umask 077
          printf '%s' "${CRANECLOUD_TOKEN}" > ~/.cranecloud/token
          printf '%s' "${CRANECLOUD_USER_ID}" > ~/.cranecloud/user_id
          chmod 600 ~/.cranecloud/token ~/.cranecloud/user_id
        env:
          CRANECLOUD_TOKEN: ${{ secrets.CRANECLOUD_TOKEN }}
          CRANECLOUD_USER_ID: ${{ secrets.CRANECLOUD_USER_ID }}

      - name: Verify CLI can talk to Crane Cloud
        run: |
          set -euo pipefail
          if ! cranecloud auth user 2>&1 | tee /tmp/auth.log; then
            echo "::error::cranecloud auth user failed — likely the CLI version re-introduced a keyring dependency that the null backend cannot satisfy."
            echo ""
            echo "::warning::Fallback: deploy manually from an interactive shell."
            echo "  cd infra/cranecloud"
            echo "  make update-${{ inputs.target }} ENV=${{ inputs.env }}"
            exit 1
          fi

      - name: Update backend
        if: inputs.target == 'backend' || inputs.target == 'both'
        env:
          CRANECLOUD_BACKEND_APP_ID: ${{ secrets.CRANECLOUD_BACKEND_APP_ID }}
          IMAGE: ghcr.io/${{ github.repository_owner }}/landguard-uganda-backend:${{ inputs.image_tag }}
        run: |
          set -euo pipefail
          echo "→ Updating backend ($CRANECLOUD_BACKEND_APP_ID) to image: $IMAGE"
          cranecloud apps update "$CRANECLOUD_BACKEND_APP_ID" \
            --image "$IMAGE"

      - name: Update frontend
        if: inputs.target == 'frontend' || inputs.target == 'both'
        env:
          CRANECLOUD_FRONTEND_APP_ID: ${{ secrets.CRANECLOUD_FRONTEND_APP_ID }}
          IMAGE: ghcr.io/${{ github.repository_owner }}/landguard-uganda-frontend:${{ inputs.image_tag }}
        run: |
          set -euo pipefail
          echo "→ Updating frontend ($CRANECLOUD_FRONTEND_APP_ID) to image: $IMAGE"
          cranecloud apps update "$CRANECLOUD_FRONTEND_APP_ID" \
            --image "$IMAGE"

      - name: Post-deploy summary
        if: always()
        run: |
          {
            echo "### Crane Cloud deploy"
            echo
            echo "| Field      | Value |"
            echo "| ---------- | ----- |"
            echo "| env        | \`${{ inputs.env }}\` |"
            echo "| target     | \`${{ inputs.target }}\` |"
            echo "| image_tag  | \`${{ inputs.image_tag }}\` |"
            echo "| status     | \`${{ job.status }}\` |"
            echo
            if [ "${{ job.status }}" != "success" ]; then
              echo "**Deploy did not complete.** Fallback (from an interactive shell):"
              echo
              echo '```bash'
              echo "cd infra/cranecloud"
              if [ "${{ inputs.target }}" = "both" ]; then
                echo "make update-backend ENV=${{ inputs.env }} && make update-frontend ENV=${{ inputs.env }}"
              else
                echo "make update-${{ inputs.target }} ENV=${{ inputs.env }}"
              fi
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup token
        if: always()
        run: |
          shred -uz ~/.cranecloud/token 2>/dev/null || rm -f ~/.cranecloud/token
          shred -uz ~/.cranecloud/user_id 2>/dev/null || rm -f ~/.cranecloud/user_id
